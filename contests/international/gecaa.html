<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GeCAA Archive | ALPS Community</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Playfair Display", serif;
    color:#eaf2ff;
    background:url("https://i.postimg.cc/gkRkmSTw/weic2205a.jpg") center/cover fixed no-repeat;
    min-height:100vh;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background: radial-gradient(circle at top, rgba(0,70,140,0.35), rgba(0,0,0,0.9));
    z-index:1;
}

/* ================= NAVBAR ================= */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:18px 50px;
    z-index:3;
}

.logo-container{display:flex;align-items:center;gap:10px;}
.logo-container img{height:32px;}
.logo-text{font-weight:700;letter-spacing:2px;font-size:15px;}

.nav-links{display:flex;gap:18px;}
.nav-links a{text-decoration:none;color:#cfe2ff;font-size:14px;}
.nav-links a:hover{color:#4da3ff;}

/* ================= CONTAINER ================= */
.container{
    position:relative;
    z-index:2;
    max-width:1200px;
    margin:120px auto;
    padding:0 20px;
}

.title{font-size:48px;}
.subtitle{
    font-family:Poppins;
    margin:10px 0 30px;
    color:#bcd6ff;
    line-height:1.6;
}

/* ================= GRID (RESEARCH STYLE) ================= */
.research-initiative-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:30px;
}

/* ================= CARD ================= */
.research-box{
    background: rgba(10, 18, 40, 0.72);
    border: 1px solid rgba(80, 160, 255, 0.18);
    border-radius: 18px;
    overflow:hidden;

    display:flex;
    flex-direction:column;

    transition: all 0.35s ease;
    box-shadow: 0 20px 50px rgba(0,0,0,0.55);
}

/* hover */
.research-box:hover{
    transform: translateY(-10px);
    border-color: #4da3ff;
    box-shadow:
        0 25px 70px rgba(0,0,0,0.7),
        0 0 25px rgba(77,163,255,0.25);
}

/* ================= BIG IMAGE HEADER ================= */
.box-image-wrap{
    width:100%;
    height:260px;   /* 🔥 BIGGER LOGO AREA */
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.25);
    border-bottom:1px solid rgba(80,160,255,0.15);
}

.box-image-wrap img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.research-box:hover .box-image-wrap img{
    transform:scale(1.08);
}

/* ================= CONTENT ================= */
.box-content{
    padding:22px;
    display:flex;
    flex-direction:column;
    gap:8px;
    align-items:center;
}

/* YEAR */
.box-content h3{
    font-family:Playfair Display;
    font-weight:900;
    font-size:24px;
    letter-spacing:1px;
    color:#d6eaff;
    text-align:center;
}

/* CITY */
.city{
    font-family:Inter;
    font-size:16px;
    color:#9fd0ff;
}

/* COUNTRY */
.country{
    font-family:Poppins;
    font-size:26px;
    color:#ffffff;
}

/* ================= BUTTONS ================= */
.btn-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:10px;
}

.btn{
    display:inline-block;
    text-decoration:none;   /* THIS removes underline */
    font-family:Inter;
    font-size:12px;
    padding:7px 12px;
    border-radius:9px;

    background:rgba(10,20,40,0.4);
    border:1px solid rgba(120,180,255,0.25);
    color:#cfe2ff;

    cursor:pointer;
    transition:0.2s;
}
.btn:hover{
    background:rgba(77,163,255,0.25);
    border-color:#4da3ff;
    color:#fff;
}

/* ================= SOLUTION ================= */
.solution{
    margin-top:12px;
    width:100%;
    text-align:center;
    padding:10px 12px;
    border-radius:12px;

    background:linear-gradient(90deg, rgba(77,163,255,0.18), rgba(77,163,255,0.05));
    border:1px solid rgba(77,163,255,0.35);

    font-family:Inter;
    font-size:13px;
    color:#d6eaff;

    cursor:pointer;
}

.solution:hover{
    background:rgba(77,163,255,0.3);
}

/* ================= RESPONSIVE ================= */
@media(max-width:900px){
    .research-initiative-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:600px){
    .research-initiative-grid{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<header class="navbar">
  <div class="logo-container">
    <img src="https://i.postimg.cc/SR3NbGvC/Gemini-Generated-Image-1si9y31si9y31si9-removebg-preview.png">
    <div class="logo-text">ALPS COMMUNITY</div>
  </div>

  <div class="nav-links">
    <a href="../../index.html">Home</a>
    <a href="../../contest-collections.html">Contests</a>
    <a href="#">Learn</a>
  </div>
</header>

<div class="container">

<div class="title">GeCAA Archive</div>
<div class="subtitle">
Structured Olympiad database with theory, observational and data analysis rounds.
</div>

<div class="research-initiative-grid">

  <!-- CARD 1 -->
  <div class="research-box">
    <div class="box-image-wrap">
      <img src="https://i.postimg.cc/RhVh5qsw/Ge-CAA-2020-logo-48384168.jpg">
    </div>

    <div class="box-content">
      <h3>1st GeCAA 2020</h3>
      <div class="country">Online</div>

        <div class="btn-row">
             <a class="btn" href="GeCAA/theory_2020_gecaa.pdf" target="_blank">Theory</a>
             <a class="btn" href="GeCAA/da_2020_gecaa.pdf" target="_blank">Data Analysis</a>
             <a class="btn" href="GeCAA/obs_2020_gecaa.pdf" target="_blank">Observations</a>
        </div>

      <div class="solution">Solutions</div>
      <div class="solution">Details</div>
    </div>
  </div>

</div>

</div>


</div>

</body>
</html>
